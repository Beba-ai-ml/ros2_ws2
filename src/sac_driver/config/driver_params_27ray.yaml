sac_driver:
  ros__parameters:
    model.path: "/home/laptop/shared/różne/best_mapa1_ep18000_clean.pth"
    model.device: "cpu"
    model.weights_only: false

    lidar.angles_deg: [-15.0, 0.0, 15.0, 30.0, 45.0, 50.0, 55.0, 60.0, 65.0, 70.0, 75.0, 80.0, 85.0, 90.0, 95.0, 100.0, 105.0, 110.0, 115.0, 120.0, 125.0, 130.0, 135.0, 150.0, 165.0, 180.0, 195.0]
    lidar.max_range_m: 20.0
    lidar.angle_offset_deg: -90.0
    lidar.angle_direction: 1.0
    lidar.use_interpolation: true

    state.stack_frames: 4
    state.max_speed_mps: 8.0
    state.servo_norm_divisor: 0.9
    state.servo_norm_offset: -0.05
    state.servo_default: 0.535
    state.speed_default: 0.0
    state.collision_default: 0.0
    state.max_accel_mps2: 4.0
    state.max_yaw_rate_rad_s: 3.0

    control.rate_hz: 30.0
    control.max_steering_angle_deg: 20.0
    control.max_speed_mps: 8.0
    control.max_accel_mps2: 2.0
    control.speed_limit_mps: 2.0
    control.steer_rate_limit_deg_s: 90.0
    control.accel_rate_limit_mps2: 3.0
    control.safe_mode: true
    control.safe_speed_limit_mps: 2.0
    control.safe_steer_scale: 1.0
    control.safe_accel_scale: 1.0
    control.wheelbase_m: 0.35
    control.max_yaw_rate_rad_s: 2.5
    control.default_dt: 0.033
    control.speed_sign: -1.0
    control.steer_sign: -1.0
    control.enable_on_start: false

    topics.scan: "/scan"
    topics.odom: "/odom"
    topics.servo: "/commands/servo/position"
    topics.cmd: "/drive"
    topics.emergency_stop: "/autonomy_lock"
    topics.enable_service: "/sac_driver/enable"

    safety.watchdog_timeout_sec: 0.5
    debug.log_throttle_sec: 1.0
